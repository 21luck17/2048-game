<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">2048</h1>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div id="score" class="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div id="best-score" class="score">0</div>
                </div>
            </div>
        </header>
        <div class="intro">
            <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制滑动</p>
            <p>相同数字方块合并，合成 <strong>2048</strong> 获胜！</p>
        </div>
        <button id="new-game" class="new-game-btn">新游戏</button>
        <div id="game-board" class="game-board"></div>
        <div id="game-over" class="game-over hidden">
            <div class="game-over-content">
                <div id="game-over-title"></div>
                <button id="restart-btn" class="restart-btn">再来一局</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
